name: Beta

# Manual button (Actions tab -> Beta -> Run workflow). Builds a .vsix and
# publishes it as a GitHub *pre-release* for testers — never to a marketplace.
on:
  workflow_dispatch:
    inputs:
      notes:
        description: "Notes shown to testers on the pre-release"
        required: false
        default: "Beta build for testers."

permissions:
  contents: write

jobs:
  beta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build first so @amspirit/shared's dist exists for typecheck/test/knip.
      - name: Quality gate
        run: |
          pnpm build
          pnpm check
          pnpm typecheck
          pnpm test:coverage
          pnpm knip
          pnpm audit:prod

      - name: Package amspirit-basic VSIX
        working-directory: packages/amspirit-basic
        run: pnpm run package

      - name: Package amspirit-z80 VSIX
        working-directory: packages/amspirit-z80
        run: pnpm run package

      - name: Resolve pre-release tag + versions
        id: meta
        run: |
          echo "tag=beta-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "basic=$(node -p "require('./packages/amspirit-basic/package.json').version")" >> "$GITHUB_OUTPUT"
          echo "z80=$(node -p "require('./packages/amspirit-z80/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Publish pre-release with both VSIX
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Beta ${{ steps.meta.outputs.tag }}
          prerelease: true
          body: |
            ${{ inputs.notes }}

            - amspirit-basic ${{ steps.meta.outputs.basic }}
            - amspirit-z80 ${{ steps.meta.outputs.z80 }}
          files: |
            packages/amspirit-basic/*.vsix
            packages/amspirit-z80/*.vsix
